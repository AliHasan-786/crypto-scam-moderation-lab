name: Trust and Safety release gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-v2.txt

      - name: Install evaluation dependencies
        run: python -m pip install -r requirements-v2.txt

      - name: Run release gate
        env:
          EVAL_MANIFEST_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash scripts/run_all_checks.sh
